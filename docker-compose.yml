version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: startuppilot-backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - APIFREELLM_API_KEY=${APIFREELLM_API_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER:-apifreellm}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-apifreellm}
      - FALLBACK_PROVIDER=${FALLBACK_PROVIDER:-openai}
      - FALLBACK_MODEL=${FALLBACK_MODEL:-gpt-4o-mini}
      - UPLOAD_DIR=/app/data/uploads
      - REPORTS_DIR=/app/data/reports
      - CHROMA_PERSIST_DIR=/app/data/chroma
      - MEMORY_DIR=/app/data/memory
    volumes:
      - startuppilot-data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    container_name: startuppilot-frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  startuppilot-data:
